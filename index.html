<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Türkiye Bulmacası</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --gold:       #b8860b;
      --gold-light: #d4a93a;
      --gold-shine: #f0c040;
      --parchment:  #f5efe0;
      --ink:        #2c1f0e;
      --red:        #c0392b;
    }
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      background-color: #1e1610;
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(184,134,11,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(80,140,180,0.12) 0%, transparent 55%);
      font-family: 'Crimson Pro', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 16px;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      width: 100%; max-width: 1300px;
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(184,134,11,0.25);
      margin-bottom: 10px;
    }
    .header-left { display:flex; flex-direction:column; gap:2px; }
    .title-main {
      font-family:'Cinzel',serif; font-size:26px; font-weight:700;
      letter-spacing:3px; color:var(--gold-light);
      text-shadow: 0 0 40px rgba(212,169,58,0.35), 1px 1px 0 rgba(0,0,0,0.6);
    }
    .title-sub {
      font-family:'Crimson Pro',serif; font-style:italic;
      font-size:12px; color:rgba(212,169,58,0.5); letter-spacing:2px;
    }
    .header-center { font-size:20px; color:rgba(184,134,11,0.35); }

    /* HUD kartları */
    .hud { display:flex; gap:10px; }
    .hud-card {
      background: rgba(255,220,120,0.07);
      border: 1px solid rgba(184,134,11,0.38);
      border-radius:8px; padding:5px 14px; text-align:center; min-width:88px;
    }
    .hud-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:rgba(212,169,58,0.55); text-transform:uppercase; }
    .hud-value { font-family:'Cinzel',serif; font-size:17px; font-weight:600; color:var(--gold-light); line-height:1.3; }
    #score-value { color:var(--gold-shine); }

    /* ── PROGRESS ── */
    .progress-wrap { width:100%; max-width:1300px; margin-bottom:10px; position:relative; }
    .progress-label { position:absolute; right:0; top:-16px; font-family:'Cinzel',serif; font-size:8px; letter-spacing:1px; color:rgba(212,169,58,0.45); }
    .progress-bg { height:5px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
    .progress-fill {
      height:100%; width:0%;
      background: linear-gradient(90deg, #b8860b, #f0c040);
      border-radius:3px;
      transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 8px rgba(212,169,58,0.5);
    }

    /* ── LAYOUT ── */
    .main-layout { width:100%; max-width:1300px; display:flex; gap:12px; flex:1; min-height:0; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px; flex-shrink:0;
      display:flex; flex-direction:column; gap:8px;
    }

    /* Stat mini-kartları üstte */
    .stat-bar {
      display:grid; grid-template-columns:1fr 1fr; gap:6px;
    }
    .stat-mini {
      background: rgba(255,220,120,0.07);
      border:1px solid rgba(184,134,11,0.28);
      border-radius:7px; padding:7px 8px; text-align:center;
    }
    .stat-mini-label { font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:1.5px; color:rgba(212,169,58,0.45); text-transform:uppercase; margin-bottom:2px; }
    .stat-mini-value { font-family:'Cinzel',serif; font-size:16px; font-weight:600; color:var(--gold-light); line-height:1; }
    #sm-score { color:var(--gold-shine); }

    .panel {
      background: rgba(255,220,120,0.06);
      border:1px solid rgba(184,134,11,0.32);
      border-radius:9px; padding:14px;
    }
    .panel-title {
      font-family:'Cinzel',serif; font-size:10px; letter-spacing:2.5px;
      color:var(--gold); text-transform:uppercase;
      border-bottom:1px solid rgba(184,134,11,0.15);
      padding-bottom:8px; margin-bottom:10px;
    }

    /* İpucu */
    .hint-dots { display:flex; gap:5px; margin-bottom:8px; }
    .hint-dot {
      width:9px; height:9px; border-radius:50%;
      background:var(--gold); box-shadow:0 0 5px rgba(184,134,11,0.5);
      transition:all 0.3s;
    }
    .hint-dot.used { background:rgba(255,255,255,0.08); box-shadow:none; }
    .hint-btn {
      width:100%; padding:9px 4px;
      border:1px solid rgba(184,134,11,0.35); border-radius:6px;
      background: rgba(184,134,11,0.08);
      color:var(--gold-light); font-family:'Cinzel',serif;
      font-size:11px; letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    }
    .hint-btn:hover:not(:disabled) { background:rgba(184,134,11,0.2); transform:translateY(-1px); }
    .hint-btn:disabled { opacity:0.3; cursor:not-allowed; }

    /* Butonlar */
    .btn-primary {
      width:100%; padding:10px; border:none; border-radius:7px;
      background: linear-gradient(135deg, #b8860b, #d4a93a);
      color:#1a1000; font-family:'Cinzel',serif; font-size:11px;
      letter-spacing:1.5px; font-weight:700; cursor:pointer;
      transition:all 0.25s; box-shadow:0 2px 10px rgba(184,134,11,0.25);
    }
    .btn-primary:hover { filter:brightness(1.12); transform:translateY(-1px); box-shadow:0 4px 16px rgba(184,134,11,0.4); }

    .btn-secondary {
      width:100%; padding:9px; border:1px solid rgba(192,57,43,0.35);
      border-radius:7px; background:transparent;
      color:rgba(192,57,43,0.65); font-family:'Cinzel',serif;
      font-size:11px; letter-spacing:1.5px; cursor:pointer; transition:all 0.2s;
    }
    .btn-secondary:hover { background:rgba(192,57,43,0.08); color:var(--red); border-color:var(--red); }

    .action-row { display:flex; flex-direction:column; gap:6px; }

    /* Lider tablosu */
    .lb-entry {
      display:flex; align-items:center; gap:7px;
      padding:6px 0; border-bottom:1px solid rgba(184,134,11,0.08);
    }
    .lb-rank { font-family:'Cinzel',serif; font-size:11px; color:var(--gold); width:18px; text-align:center; }
    .lb-rank.gold   { color:#ffd700; }
    .lb-rank.silver { color:#c0c0c0; }
    .lb-rank.bronze { color:#cd7f32; }
    .lb-name { flex:1; color:rgba(245,239,224,0.7); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lb-time { font-family:'Cinzel',serif; font-size:11px; color:var(--gold-light); }
    .lb-loading { font-style:italic; color:rgba(212,169,58,0.35); font-size:10px; text-align:center; padding:8px 0; animation:pulse 1.5s ease-in-out infinite; }
    .lb-empty   { font-style:italic; color:rgba(245,239,224,0.25); font-size:10px; text-align:center; padding:8px 0; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ── MAP ── */
    .map-wrapper {
      flex:1; position:relative;
      border:1px solid rgba(184,134,11,0.18);
      border-radius:10px; overflow:hidden;
      background: radial-gradient(ellipse at 50% 50%, rgba(40,60,80,0.15), rgba(10,8,4,0.4));
    }
    .map-wrapper::before, .map-wrapper::after {
      content:'✦'; position:absolute; font-size:12px; color:rgba(184,134,11,0.25); z-index:10;
    }
    .map-wrapper::before { top:7px; left:10px; }
    .map-wrapper::after  { top:7px; right:10px; }
    #map-container { width:100%; height:100%; }
    #map-container svg { width:100%; height:100%; }

    /* ── OVERLAY ── */
    .overlay {
      position:fixed; inset:0;
      background:rgba(8,5,2,0.9); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      z-index:999; opacity:0; pointer-events:none; transition:opacity 0.4s;
    }
    .overlay.visible { opacity:1; pointer-events:all; }
    .overlay-card {
      background: linear-gradient(160deg, #241a0c, #16100a);
      border:1px solid rgba(184,134,11,0.38);
      border-radius:14px; padding:44px 48px; text-align:center;
      max-width:460px; width:90%;
      box-shadow: 0 0 80px rgba(184,134,11,0.12), 0 20px 60px rgba(0,0,0,0.7);
      transform:scale(0.88); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .overlay.visible .overlay-card { transform:scale(1); }
    .overlay-icon { font-size:48px; margin-bottom:14px; display:block; }
    .overlay-title { font-family:'Cinzel',serif; font-size:22px; font-weight:700; color:var(--gold-light); letter-spacing:3px; margin-bottom:8px; }
    .overlay-msg   { font-family:'Crimson Pro',serif; font-style:italic; font-size:16px; color:rgba(245,239,224,0.65); margin-bottom:24px; line-height:1.5; }
    .overlay-stats { display:flex; gap:24px; justify-content:center; margin-bottom:28px; }
    .stat-item { text-align:center; }
    .stat-label { font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:rgba(212,169,58,0.45); text-transform:uppercase; }
    .stat-value { font-family:'Cinzel',serif; font-size:20px; color:var(--gold-shine); font-weight:600; }
    .name-input-wrap { margin-bottom:18px; }
    .name-input-wrap label { display:block; font-family:'Cinzel',serif; font-size:8px; letter-spacing:2px; color:rgba(212,169,58,0.55); margin-bottom:5px; text-transform:uppercase; }
    .name-input {
      width:100%; padding:9px 12px;
      background:rgba(245,239,224,0.04); border:1px solid rgba(184,134,11,0.3);
      border-radius:7px; color:var(--parchment);
      font-family:'Crimson Pro',serif; font-size:14px; text-align:center; outline:none;
      transition:border-color 0.2s;
    }
    .name-input:focus { border-color:var(--gold); box-shadow:0 0 10px rgba(184,134,11,0.18); }
    .overlay-btns { display:flex; gap:10px; }

    /* ── ANIMATIONS ── */
    @keyframes hintPulse {
      0%   { filter:drop-shadow(0 0 0px #ffd700) brightness(1); }
      50%  { filter:drop-shadow(0 0 14px #ffd700) brightness(1.5); }
      100% { filter:drop-shadow(0 0 0px #ffd700) brightness(1); }
    }
    .hint-target path { animation:hintPulse 0.7s ease-in-out 3; }

    @keyframes snapRipple {
      from { r:0; opacity:0.8; }
      to   { r:40px; opacity:0; }
    }
    .snap-ripple { animation:snapRipple 0.5s ease-out forwards; }

    /* Parça yerleşince kısa parlama */
    @keyframes placedFlash {
      0%   { opacity:1; }
      40%  { opacity:0.6; }
      100% { opacity:1; }
    }
    .piece.just-placed { animation:placedFlash 0.35s ease-out; }

    #tooltip {
      position:fixed; background:rgba(22,14,5,0.96); border:1px solid rgba(184,134,11,0.38);
      border-radius:5px; padding:4px 9px; font-family:'Cinzel',serif; font-size:10px;
      color:var(--gold-light); letter-spacing:1px; pointer-events:none;
      opacity:0; transition:opacity 0.12s; z-index:500;
    }

    /* ── MOBILE ── */
    @media (max-width:700px) {
      body { padding:8px; }
      header { padding-bottom:8px; margin-bottom:8px; }
      .title-main { font-size:17px; letter-spacing:1.5px; }
      .title-sub  { font-size:10px; }
      .header-center { display:none; }
      .hud { display:none; } /* mobilde stat-bar kullanılıyor */
      .progress-wrap { margin-bottom:7px; }
      .main-layout { flex-direction:column; gap:8px; }
      .map-wrapper { width:100%; height:55vw; min-height:200px; max-height:370px; flex:none; }
      .sidebar { width:100%; flex-direction:row; flex-wrap:wrap; gap:7px; }
      .stat-bar { display:none; } /* header hud + stat-bar ikisi aynı bilgiyi gösteriyor, mobilde header hud gizlendi stat-bar kalacak */
      .sidebar .panel:nth-child(2) { flex:1; min-width:130px; }
      .sidebar .panel:nth-child(3) { flex:1; min-width:110px; }
      .sidebar .panel:nth-child(4) { width:100%; max-height:130px; }
      .action-row { flex-direction:row; gap:6px; }
      .btn-primary  { font-size:9px; padding:8px 4px; letter-spacing:0.8px; }
      .btn-secondary{ font-size:9px; padding:7px 4px; }
      .panel { padding:9px; }
      .panel-title { font-size:8.5px; }
      .hint-btn { font-size:9px; padding:7px; }
    }

    @media (max-height:500px) and (orientation:landscape) {
      body { padding:4px 8px; }
      header { padding-bottom:5px; margin-bottom:4px; }
      .title-main { font-size:14px; }
      .title-sub, .header-center { display:none; }
      .hud-card { padding:3px 8px; min-width:60px; }
      .hud-value { font-size:13px; }
      .progress-bg { height:3px; }
      .progress-wrap { margin-bottom:4px; }
      .main-layout { flex-direction:row; height:calc(100vh - 48px); gap:8px; }
      .map-wrapper { flex:1; height:100%; max-height:none; min-height:0; }
      .sidebar { width:168px; flex-shrink:0; flex-direction:column; overflow-y:auto; gap:6px; }
      .stat-bar { grid-template-columns:1fr 1fr; }
      .sidebar .panel:nth-child(4) { flex:1; min-height:0; }
      .panel { padding:8px; }
      .panel-title { font-size:8px; }
    }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(184,134,11,0.25); border-radius:2px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="title-main">TÜRKİYE BİLMECESİ</span>
    <span class="title-sub">coğrafya keşif oyunu</span>
  </div>
  <div class="header-center">✦ ❧ ✦</div>
  <div class="hud">
    <div class="hud-card">
      <div class="hud-label">Süre</div>
      <div class="hud-value" id="timer-val">00:00</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">İlerleme</div>
      <div class="hud-value"><span id="score-value">0</span><span style="font-size:10px;color:rgba(212,169,58,0.45)">/81</span></div>
    </div>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-label" id="progress-pct">0%</div>
  <div class="progress-bg"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="main-layout">
  <aside class="sidebar">

    <!-- Mobil için mini stat kartları -->
    <div class="stat-bar">
      <div class="stat-mini">
        <div class="stat-mini-label">Süre</div>
        <div class="stat-mini-value" id="sm-timer">00:00</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">İl</div>
        <div class="stat-mini-value"><span id="sm-score">0</span><span style="font-size:10px;color:rgba(212,169,58,0.4)">/81</span></div>
      </div>
    </div>

    <!-- İpucu -->
    <div class="panel">
      <div class="panel-title">İpucu</div>
      <div class="hint-dots" id="hint-dots"></div>
      <button class="hint-btn" id="hint-btn">🔍 İPUCU KULLAN</button>
      <p style="font-size:9.5px;font-style:italic;color:rgba(212,169,58,0.35);margin-top:7px;line-height:1.4;">
        En uzak parçayı haritada gösterir.
      </p>
    </div>

    <!-- Oyun -->
    <div class="panel action-row">
      <div class="panel-title">Oyun</div>
      <button class="btn-primary" id="restart-btn">YENİDEN BAŞLAT</button>
    </div>

    <!-- Lider tablosu -->
    <div class="panel" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="panel-title">Lider Tablosu</div>
      <div id="leaderboard" style="overflow-y:auto;flex:1;"></div>
    </div>

  </aside>

  <div class="map-wrapper" id="map-container"></div>
</div>

<div id="tooltip"></div>

<div class="overlay" id="win-overlay">
  <div class="overlay-card">
    <span class="overlay-icon">🏆</span>
    <div class="overlay-title">TEBRİKLER!</div>
    <div class="overlay-msg" id="win-msg">Tüm illeri başarıyla yerleştirdiniz.</div>
    <div class="overlay-stats">
      <div class="stat-item"><div class="stat-label">Süre</div><div class="stat-value" id="win-time">—</div></div>
      <div class="stat-item"><div class="stat-label">İpucu</div><div class="stat-value" id="win-hints">—</div></div>
    </div>
    <div class="name-input-wrap">
      <label>Adınızı girin (lider tablosuna kayıt)</label>
      <input class="name-input" id="player-name" type="text" placeholder="Oyuncu adı..." maxlength="18"/>
    </div>
    <div class="overlay-btns">
      <button class="btn-primary"   id="save-score-btn" style="flex:1">KAYDET</button>
      <button class="btn-secondary" id="win-restart-btn" style="flex:1">YENİDEN</button>
    </div>
  </div>
</div>

<script>
/* ── SUPABASE ── */
const SUPABASE_URL = 'https://pffgawknbmjqljzksuqy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmZmdhd2tuYm1qcWxqemtzdXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTg0OTQsImV4cCI6MjA4ODg3NDQ5NH0.NuI91CBFi4SlR566SB1TwCbXg-sWvHPsOi2HYCd3HlQ';

async function sbFetch(path, opts={}) {
  const h = { 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json' };
  if (opts.prefer) h['Prefer'] = opts.prefer;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {...opts, headers:h});
  if (!res.ok) throw new Error(await res.text());
  if (res.status===204 || res.headers.get('content-length')==='0') return null;
  const t = await res.text(); return t ? JSON.parse(t) : null;
}

/* ── STATE ── */
const TOTAL=81, MAX_HINTS=5, SNAP_DIST=18;
let correctPieces=0, timerStarted=false, startTime, timerInterval;
let hintsUsed=0, hintsLeft=MAX_HINTS, scoreSaved=false;

/* ── LEADERBOARD ── */
async function fetchLeaderboard() {
  document.getElementById('leaderboard').innerHTML='<p class="lb-loading">Yükleniyor…</p>';
  try {
    const data = await sbFetch('scores?select=name,seconds,time_display,hints_used&order=seconds.asc&limit=15');
    renderLeaderboard(data);
  } catch(e) {
    document.getElementById('leaderboard').innerHTML='<p class="lb-empty">Bağlantı hatası.</p>';
  }
}
async function submitScore(name,seconds,timeDisplay,hintsUsed) {
  await sbFetch('scores',{method:'POST',prefer:'return=minimal',body:JSON.stringify({name,seconds,time_display:timeDisplay,hints_used:hintsUsed})});
}
function renderLeaderboard(lb) {
  const el=document.getElementById('leaderboard');
  if (!lb||!lb.length){el.innerHTML='<p class="lb-empty">Henüz kayıt yok.</p>';return;}
  const medal=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
  const rc=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  el.innerHTML=lb.map((e,i)=>`
    <div class="lb-entry">
      <span class="lb-rank ${rc(i)}">${medal(i)}</span>
      <span class="lb-name">${e.name}</span>
      <span style="font-size:8px;color:rgba(212,169,58,0.35);font-family:'Cinzel',serif">💡${e.hints_used}</span>
      <span class="lb-time">${e.time_display}</span>
    </div>`).join('');
}

/* ── TIMER ── */
function startTimer() {
  startTime=Date.now();
  timerInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-startTime)/1000);
    const txt=`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    document.getElementById('timer-val').textContent=txt;
    document.getElementById('sm-timer').textContent=txt;
  },500);
}
function stopTimer(){clearInterval(timerInterval);}
function getElapsedTime(){
  const s=Math.floor((Date.now()-startTime)/1000);
  return{display:`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`,seconds:s};
}

/* ── SCORE ── */
function updateScore(){
  document.getElementById('score-value').textContent=correctPieces;
  document.getElementById('sm-score').textContent=correctPieces;
  const pct=Math.round((correctPieces/TOTAL)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
}

/* ── HINTS ── */
function renderHintDots(){
  const w=document.getElementById('hint-dots'); w.innerHTML='';
  for(let i=0;i<MAX_HINTS;i++){
    const d=document.createElement('div');
    d.className='hint-dot'+(i>=hintsLeft?' used':'');
    w.appendChild(d);
  }
  document.getElementById('hint-btn').disabled=(hintsLeft<=0);
}

/* ── TOOLTIP ── */
const tooltip=document.getElementById('tooltip');
function showTT(e,t){tooltip.textContent=t;tooltip.style.opacity='1';moveTT(e);}
function moveTT(e){tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-28)+'px';}
function hideTT(){tooltip.style.opacity='0';}

/* ── MAP SETUP ── */
const container=document.getElementById('map-container');
const W=container.clientWidth||960, H=container.clientHeight||600;

const svg=d3.select('#map-container').append('svg')
  .attr('width','100%').attr('height','100%')
  .attr('viewBox',`0 0 ${W} ${H}`).style('overflow','hidden');

// Deniz arka planı — daha canlı mavi
svg.append('defs').append('radialGradient').attr('id','seaGrad')
  .attr('cx','50%').attr('cy','50%').attr('r','70%');
svg.select('defs radialGradient')
  .append('stop').attr('offset','0%').attr('stop-color','#2a5070').attr('stop-opacity','0.7');
svg.select('defs radialGradient')
  .append('stop').attr('offset','100%').attr('stop-color','#152535').attr('stop-opacity','0.9');
svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#seaGrad)');

const FM=8;
// İnce çerçeve
svg.append('rect').attr('x',FM).attr('y',FM)
  .attr('width',W-FM*2).attr('height',H-FM*2)
  .attr('fill','none').attr('stroke','rgba(184,134,11,0.4)').attr('stroke-width',1.5).attr('rx',5);

const projection=d3.geoMercator().center([35,39]).scale(W*2.5).translate([W/2,H/2]);
const path=d3.geoPath().projection(projection);

const defs=svg.select('defs');

// Drop shadow filtresi
const fShadow=defs.append('filter').attr('id','shadow');
fShadow.append('feDropShadow').attr('dx','0').attr('dy','2').attr('stdDeviation','3').attr('flood-color','rgba(0,0,0,0.5)').attr('flood-opacity','1');

// Hover glow
const fGlow=defs.append('filter').attr('id','hoverGlow');
fGlow.append('feDropShadow').attr('dx','0').attr('dy','0').attr('stdDeviation','5').attr('flood-color','#d4a93a').attr('flood-opacity','0.7');

// Yerleştirilen parça gradient — yeşil (objectBoundingBox: her parçada aynı görünür)
const placedGrad=defs.append('linearGradient').attr('id','placedGrad')
  .attr('gradientUnits','objectBoundingBox')
  .attr('x1','0').attr('y1','0').attr('x2','0').attr('y2','1');
placedGrad.append('stop').attr('offset','0%').attr('stop-color','#6dcc6d');
placedGrad.append('stop').attr('offset','100%').attr('stop-color','#2e8b2e');

// Bölge renk paleti — her il için hafif farklı ton
const REGION_COLORS = [
  '#d4956a', // turuncu-kahve
  '#c8a840', // altın sarı
  '#7aab7a', // yumuşak yeşil
  '#6a9eba', // mavi-gri
  '#c47a5a', // bakır
  '#b8c460', // sarı-yeşil
  '#d4845a', // terra cotta
  '#88b4c8', // açık mavi
  '#c8a040', // amber
  '#a8785a', // kızıl kahve
  '#80b890', // adaçayı yeşili
  '#d49060', // şeftali
  '#7090c0', // slate mavi
  '#c8b450', // altın koyu
  '#b87080', // gülkurusu
  '#70a898', // çay yeşili
];

d3.json('turkiye.geojson').then(data => {

  // Arka plan il sınırları — daha belirgin
  svg.selectAll('.base-province').data(data.features).enter().append('path')
    .attr('class','base-province').attr('d',path)
    .attr('fill','rgba(200,175,120,0.18)')
    .attr('stroke','rgba(184,134,11,0.35)').attr('stroke-width',0.8);

  // Şehir isimleri — çift katmanlı halo
  svg.selectAll('.province-label-halo').data(data.features).enter().append('text')
    .attr('class', d=>`province-label-halo lbl-${d.properties.ilad.replace(/\s/g,'_')}`)
    .attr('x',d=>path.centroid(d)[0]).attr('y',d=>path.centroid(d)[1])
    .text(d=>d.properties.ilad)
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-size','8.5px').attr('font-family','Cinzel, serif').attr('font-weight','400')
    .attr('fill','none')
    .attr('stroke','rgba(12,6,0,0.9)').attr('stroke-width','2.5px').attr('stroke-linejoin','round')
    .style('pointer-events','none').style('user-select','none');

  svg.selectAll('.province-label').data(data.features).enter().append('text')
    .attr('class', d=>`province-label lbl-${d.properties.ilad.replace(/\s/g,'_')}`)
    .attr('x',d=>path.centroid(d)[0]).attr('y',d=>path.centroid(d)[1])
    .text(d=>d.properties.ilad)
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-size','8.5px').attr('font-family','Cinzel, serif').attr('font-weight','400')
    .attr('fill','#f0d878')
    .style('pointer-events','none').style('user-select','none');

  // ── PARÇALAR ──
  const shuffled=[...data.features].sort(()=>Math.random()-0.5);
  const pieces=svg.selectAll('.piece').data(shuffled).enter().append('g').attr('class','piece');

  const frameW=W-FM*2, frameH=H-FM*2;
  const perimeter=2*(frameW+frameH);
  const step=perimeter/shuffled.length;
  const border=38;

  pieces.each(function(d,i){
    const dist=step*i; let x,y;
    if      (dist<frameW)            {x=FM+dist;                        y=FM+border;}
    else if (dist<frameW+frameH)     {x=FM+frameW-border;               y=FM+(dist-frameW);}
    else if (dist<2*frameW+frameH)   {x=FM+frameW-(dist-frameW-frameH); y=FM+frameH-border;}
    else                              {x=FM+border;                      y=FM+frameH-(dist-2*frameW-frameH);}

    const centroid=path.centroid(d);
    // Her parçaya hafif farklı renk tonu
    const col=REGION_COLORS[i % REGION_COLORS.length];

    d3.select(this)
      .attr('transform',`translate(${x},${y}) scale(0.5)`).style('opacity',0)
      .transition().duration(600).delay(i*15).ease(d3.easeCubicOut)
      .attr('transform',`translate(${x},${y}) scale(1)`).style('opacity',1);

    d3.select(this).append('path').attr('d',path(d))
      .attr('fill', col)
      .attr('stroke','rgba(60,35,10,0.8)').attr('stroke-width',1.2)
      .attr('transform',`translate(${-centroid[0]},${-centroid[1]})`)
      .style('filter','url(#shadow)').style('cursor','grab');
  });

  // ── HOVER & DRAG ──
  function evtCoords(event){
    const src=event.sourceEvent;
    if(!src) return{x:event.x,y:event.y};
    if(src.touches&&src.touches.length) return{x:src.touches[0].clientX,y:src.touches[0].clientY};
    if(src.changedTouches&&src.changedTouches.length) return{x:src.changedTouches[0].clientX,y:src.changedTouches[0].clientY};
    return{x:src.clientX,y:src.clientY};
  }
  function svgPoint(cx,cy){
    const el=svg.node(), pt=el.createSVGPoint();
    pt.x=cx; pt.y=cy;
    const ctm=el.getScreenCTM(); if(!ctm) return{x:cx,y:cy};
    const tp=pt.matrixTransform(ctm.inverse());
    return{x:tp.x,y:tp.y};
  }

  let offsetX,offsetY;

  pieces
    .on('mouseover',function(event,d){
      if(d3.select(this).classed('fixed')) return;
      d3.select(this).select('path')
        .transition().duration(100)
        .attr('fill','#f0d870').attr('stroke','#e8b830')
        .style('filter','url(#hoverGlow)');
      d3.select(this).raise();
    })
    .on('mousemove', null)
    .on('mouseout',function(event,d){
      if(d3.select(this).classed('fixed')) return;
      const i=shuffled.indexOf(d);
      const col=REGION_COLORS[i%REGION_COLORS.length];
      d3.select(this).select('path')
        .transition().duration(150)
        .attr('fill',col).attr('stroke','rgba(60,35,10,0.8)')
        .style('filter','url(#shadow)');
      hideTT();
    });

  const drag=d3.drag()
    .on('start',function(event){
      if(d3.select(this).classed('fixed')) return;
      hideTT();
      const c=evtCoords(event), sc=svgPoint(c.x,c.y);
      const t=d3.select(this).attr('transform').match(/translate\(([^,]+),([^)]+)\)/);
      offsetX=sc.x-parseFloat(t[1]); offsetY=sc.y-parseFloat(t[2]);
      d3.select(this).raise().classed('active',true).select('path').style('cursor','grabbing');
    })
    .on('drag',function(event){
      if(d3.select(this).classed('fixed')) return;
      if(!timerStarted){startTimer();timerStarted=true;}
      const c=evtCoords(event), sc=svgPoint(c.x,c.y);
      let nx=sc.x-offsetX, ny=sc.y-offsetY;
      const bb=d3.select(this).select('path').node().getBBox();
      nx=Math.max(FM+bb.width/2, Math.min(FM+frameW-bb.width/2, nx));
      ny=Math.max(FM+bb.height/2,Math.min(FM+frameH-bb.height/2,ny));
      d3.select(this).attr('transform',`translate(${nx},${ny})`);
    })
    .on('end',function(event,d){
      if(d3.select(this).classed('fixed')) return;
      const [cx,cy]=path.centroid(d);
      const t=d3.select(this).attr('transform').match(/translate\(([^,]+),([^)]+)\)/);
      const dist=Math.hypot(cx-parseFloat(t[1]),cy-parseFloat(t[2]));

      if(dist<=SNAP_DIST){
        // Snap animasyonu
        d3.select(this).interrupt()
          .transition().duration(250).ease(d3.easeCubicOut)
          .attr('transform',`translate(${cx},${cy}) scale(1.07)`)
          .transition().duration(160)
          .attr('transform',`translate(${cx},${cy}) scale(1)`);

        // Parça düz yeşil — gradient yerine flat renk, her parçada aynı görünür
        d3.select(this).select('path').interrupt()
          .attr('fill','#4caf50')
          .attr('stroke','rgba(100,220,100,0.7)')
          .attr('stroke-width',1.4)
          .style('filter','none');

        d3.select(this).classed('fixed',true)
          .on('mouseover',null).on('mousemove',null).on('mouseout',null);
        hideTT();

        // Ripple
        svg.append('circle').attr('cx',cx).attr('cy',cy).attr('r',0)
          .attr('fill','none').attr('stroke','rgba(80,220,80,0.6)').attr('stroke-width',2)
          .attr('class','snap-ripple')
          .on('end', function(){d3.select(this).remove();});
        setTimeout(()=>svg.selectAll('.snap-ripple').remove(),600);

        // Yerleşen parça üstüne isim
        d3.select(this).append('text').text(d.properties.ilad)
          .attr('font-size','8.5px').attr('font-family','Cinzel, serif')
          .attr('fill','#fff8e0').attr('font-weight','600')
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .style('user-select','none').style('paint-order','stroke')
          .style('stroke','rgba(0,0,0,0.65)').style('stroke-width','2.5px')
          .style('pointer-events','none');

        svg.selectAll(`.lbl-${d.properties.ilad.replace(/\s/g,'_')}`).remove();
        correctPieces++; updateScore();
        if(correctPieces===TOTAL) onWin();
      }
      d3.select(this).classed('active',false).select('path').style('cursor','grab');
    });

  pieces.call(drag);

  svg.node().addEventListener('touchstart',e=>{
    if(e.target.closest && e.target.closest('g.piece:not(.fixed)')) e.preventDefault();
  },{passive:false});
  svg.node().addEventListener('touchmove',e=>{
    if(e.target.closest && e.target.closest('g.piece:not(.fixed)')) e.preventDefault();
  },{passive:false});

  updateScore();

  // ── HINT ──
  let worstPieceData;
  document.getElementById('hint-btn').addEventListener('click',()=>{
    if(hintsLeft<=0) return;
    let worstPiece=null, worstDist=-1;
    pieces.each(function(d){
      if(d3.select(this).classed('fixed')) return;
      const [cx,cy]=path.centroid(d);
      const t=d3.select(this).attr('transform').match(/translate\(([^,]+),([^)]+)\)/);
      if(!t) return;
      const dist=Math.hypot(cx-parseFloat(t[1]),cy-parseFloat(t[2]));
      if(dist>worstDist){worstDist=dist;worstPiece=this;worstPieceData=d;}
    });
    if(!worstPiece) return;
    hintsLeft--; hintsUsed++; renderHintDots();
    const il=worstPieceData.properties.ilad;
    svg.selectAll('.base-province').filter(dd=>dd.properties.ilad===il)
      .transition().duration(200).attr('fill','rgba(255,215,0,0.3)')
      .transition().duration(1600).attr('fill','rgba(180,165,140,0.12)');
    d3.select(worstPiece).classed('hint-target',true);
    setTimeout(()=>d3.select(worstPiece).classed('hint-target',false),2200);
  });

  // ── WIN ──
  function onWin(){
    stopTimer();
    const elapsed=getElapsedTime();
    document.getElementById('win-time').textContent=elapsed.display;
    document.getElementById('win-hints').textContent=`${hintsUsed} / ${MAX_HINTS}`;
    const msgs=[
      'Türkiye\'nin her köşesini avucunuzun içi gibi biliyorsunuz!',
      'Olağanüstü bir performans! Coğrafya ustasısınız.',
      'Harika! Tüm iller yerli yerinde.'
    ];
    document.getElementById('win-msg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
    setTimeout(()=>document.getElementById('win-overlay').classList.add('visible'),400);

    const burst=setInterval(()=>{
      confetti({startVelocity:35,spread:280,ticks:55,particleCount:50,
        origin:{x:Math.random(),y:Math.random()-0.15},
        colors:['#b8860b','#ffd700','#f5efe0','#d4a93a','#f0c040']});
    },220);
    setTimeout(()=>clearInterval(burst),4500);

    document.getElementById('save-score-btn').addEventListener('click',async()=>{
      if(scoreSaved) return;
      const btn=document.getElementById('save-score-btn');
      const name=document.getElementById('player-name').value.trim()||'Anonim';
      btn.textContent='⏳ KAYDEDİLİYOR…'; btn.disabled=true;
      try{
        await submitScore(name,elapsed.seconds,elapsed.display,hintsUsed);
        scoreSaved=true; btn.textContent='✓ KAYDEDİLDİ';
        await fetchLeaderboard();
      }catch(e){btn.textContent='✗ HATA'; btn.disabled=false;}
    });
  }

});// d3.json

/* ── BUTTONS ── */
document.getElementById('restart-btn').addEventListener('click',()=>{
  if(confirm('Oyunu sıfırlayıp yeniden başlatmak istediğinize emin misiniz?')) location.reload();
});
document.getElementById('win-restart-btn').addEventListener('click',()=>location.reload());

renderHintDots();
fetchLeaderboard();
</script>
</body>
</html>
